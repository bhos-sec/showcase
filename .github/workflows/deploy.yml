name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          script: |
            set -e  # Exit on error

            echo "🚀 Starting deployment..."

            # Navigate to app directory
            cd ${{ secrets.VPS_APP_PATH }}

            # Pull latest code
            git fetch origin
            git checkout origin/main

            # Generate .env.production dynamically from GitHub Secrets
            cat > .env.production << 'ENVEOF'
            DEBUG=False
            DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }}
            ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
            SECURE_SSL_REDIRECT=False
            GITHUB_API_TOKEN=${{ secrets.GH_API_TOKEN }}
            GITHUB_ORG_NAME=${{ secrets.GH_ORG_NAME }}
            CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}
            REDIS_URL=redis://redis:6379/0
            DATABASES_DEFAULT_NAME=/data/db.sqlite3
            ENVEOF

            chmod 600 .env.production

            # Login to registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose -f docker-compose.prod.yml --env-file .env.production pull

            # Clean up old containers to free up ports
            echo "🧹 Cleaning up old containers..."
            docker compose -f docker-compose.prod.yml --env-file .env.production stop || true
            sleep 2
            docker compose -f docker-compose.prod.yml --env-file .env.production rm -f || true
            sleep 1

            # Prune docker system to free resources
            echo "🗑️  Pruning Docker system..."
            docker system prune -f || true

            # Check what's using port 80 and show it
            echo "📊 Checking port 80..."
            ss -tlnp | grep :80 || echo "Port 80 is free!"

            sleep 2

            # Backup database (safety measure)
            echo "📦 Backing up database..."
            cp ./data/db.sqlite3 ./backups/db_$(date +%Y%m%d_%H%M%S).sqlite3 2>/dev/null || echo "⚠️ No SQLite database to back up yet"

            # Deploy with zero downtime
            echo "🔄 Redeploying containers..."
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --remove-orphans

            # Run migrations
            echo "🗄️  Running migrations..."
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend python manage.py migrate

            # Remove old staticfiles directory as root to avoid permission issues
            echo "🧹 Cleaning up old static files..."
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T -u root backend bash -c "rm -rf /app/staticfiles/* && chmod -R 755 /app/staticfiles || true"

            # Collect static files
            echo "📂 Collecting static files..."
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend python manage.py collectstatic --noinput

            # Wait for backend workers to fully initialize
            echo "⏳ Waiting for backend to initialize..."
            sleep 5

            echo "✨ Deployment complete!"
