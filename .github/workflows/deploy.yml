name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          script: |
            set -e  # Exit on error

            echo "🚀 Starting deployment..."

            # Navigate to app directory
            cd ${{ secrets.VPS_APP_PATH }}

            # Pull latest code
            git fetch origin
            git checkout origin/main

            # Load environment
            set -a
            source .env.production
            set +a

            # Login to registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose -f docker-compose.prod.yml --env-file .env.production pull

            # Backup database (safety measure)
            echo "📦 Backing up database..."
            cp ./data/db.sqlite3 ./backups/db_$(date +%Y%m%d_%H%M%S).sqlite3 2>/dev/null || echo "⚠️ No SQLite database to back up yet"

            # Deploy with zero downtime
            echo "🔄 Redeploying containers..."
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --scale celery-worker=0 --scale celery-beat=0 --no-deps --build

            # Wait for backend to be ready
            echo "⏳ Waiting for backend service..."
            sleep 10

            # Run migrations
            echo "🗄️  Running migrations..."
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend python manage.py migrate

            # Remove old staticfiles directory as root to avoid permission issues
            echo "🧹 Cleaning up old static files..."
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T -u root backend bash -c "rm -rf /app/staticfiles/* && chmod -R 755 /app/staticfiles || true"

            # Collect static files
            echo "📂 Collecting static files..."
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T backend python manage.py collectstatic --noinput

            # Restart Celery services
            echo "🔄 Starting Celery services..."
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d celery-worker celery-beat

            # Verify deployment
            echo "✅ Verifying deployment..."
            sleep 5
            HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health/ || echo "000")

            if [ "$HEALTH" = "200" ]; then
              echo "✨ Deployment successful!"
            else
              echo "❌ Health check failed (HTTP $HEALTH)"
              exit 1
            fi
