<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Collective Leaderboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --background: 0 0% 7%;
        --foreground: 0 0% 90%;
        --secondary: 0 0% 12%;
        --muted-foreground: 0 0% 50%;
        --accent: 160 100% 50%;
        --border: 0 0% 20%;
        --border-dashed: 0 0% 22%;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        font-family: "Inter", system-ui, sans-serif;
        padding: 2rem;
        margin: 0;
      }

      .container {
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        border: 1px solid hsl(var(--border));
        background-color: hsl(var(--secondary) / 10%);
      }

      thead {
        background-color: hsl(var(--secondary) / 30%);
        border-bottom: 1px solid hsl(var(--border));
      }

      th {
        padding: 0.75rem 1rem;
        text-align: left;
        font-family: "Geist Mono", monospace;
        font-size: 0.625rem;
        color: hsl(var(--muted-foreground));
        text-transform: uppercase;
        letter-spacing: 0.15em;
        font-weight: 600;
        border-right: 1px dashed hsl(var(--border-dashed));
      }

      th:last-child {
        border-right: none;
      }

      th:nth-child(1) {
        width: 50px;
        text-align: center;
      }

      tbody tr {
        border-bottom: 1px solid hsl(var(--border));
        transition: background-color 0.15s;
      }

      tbody tr:hover {
        background-color: hsl(var(--secondary) / 20%);
      }

      td {
        padding: 0.75rem 1rem;
        font-size: 0.875rem;
        border-right: 1px dashed hsl(var(--border-dashed));
      }

      td:last-child {
        border-right: none;
      }

      .rank {
        text-align: center;
        font-family: "Geist Mono", monospace;
        font-weight: 600;
        color: hsl(var(--muted-foreground));
      }

      .member-cell {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .avatar {
        width: 2rem;
        height: 2rem;
        border: 1px solid hsl(var(--border));
        object-fit: cover;
        filter: grayscale(100%);
        flex-shrink: 0;
        display: block;
      }

      tbody tr:hover .avatar {
        filter: grayscale(0%);
      }

      .member-info {
        display: flex;
        flex-direction: column;
        gap: 0.125rem;
      }

      .member-name {
        font-weight: 600;
        color: hsl(var(--accent));
        text-decoration: none;
      }

      .member-name:hover {
        text-decoration: underline;
      }

      .member-github {
        font-size: 0.75rem;
        color: hsl(var(--muted-foreground));
        font-family: "Geist Mono", monospace;
      }

      .tier {
        display: inline-block;
        padding: 0.375rem 0.75rem;
        font-family: "Geist Mono", monospace;
        font-size: 0.7rem;
        border: 1px solid;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 600;
        white-space: nowrap;
        text-align: center;
      }

      .tier-founder {
        color: rgb(192, 132, 250);
        background: rgba(192, 132, 250, 0.1);
        border-color: rgba(192, 132, 250, 0.3);
      }

      .tier-lead {
        color: rgb(251, 191, 36);
        background: rgba(251, 191, 36, 0.1);
        border-color: rgba(251, 191, 36, 0.3);
      }

      .tier-mentor {
        color: rgb(96, 165, 250);
        background: rgba(96, 165, 250, 0.1);
        border-color: rgba(96, 165, 250, 0.3);
      }

      .tier-member {
        color: hsl(var(--accent));
        background: rgba(0, 255, 166, 0.1);
        border-color: rgba(0, 255, 166, 0.3);
      }

      .tier-learner {
        color: hsl(var(--muted-foreground));
        background: rgba(148, 163, 184, 0.1);
        border-color: rgba(148, 163, 184, 0.3);
      }

      .score {
        text-align: right;
        font-weight: 600;
        color: hsl(var(--accent));
        font-family: "Geist Mono", monospace;
      }

      .metric {
        text-align: right;
        font-family: "Geist Mono", monospace;
        color: hsl(var(--muted-foreground));
      }

      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .badge {
        display: inline-block;
        padding: 0.25rem 0.5rem;
        font-size: 0.65rem;
        border: 1px solid hsl(var(--border));
        background-color: hsl(var(--secondary) / 50%);
        color: hsl(var(--muted-foreground));
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-family: "Geist Mono", monospace;
        white-space: nowrap;
      }

      .no-badge {
        color: hsl(var(--muted-foreground));
      }

      @media (max-width: 768px) {
        th,
        td {
          padding: 0.5rem 0.75rem;
          font-size: 0.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <table>
        <thead>
          <tr>
            <th>Rnk</th>
            <th>Engineer</th>
            <th>Tier</th>
            <th>Score</th>
            <th>Contrib</th>
            <th>Badges</th>
          </tr>
        </thead>
        <tbody>
          {% for member in members %}
          <tr>
            <td class="rank">{{ forloop.counter }}</td>
            <td>
              <div class="member-cell">
                <img
                  src="{{ member.avatar }}"
                  alt="{{ member.name }}"
                  class="avatar"
                  referrerpolicy="no-referrer"
                />
                <div class="member-info">
                  <a
                    href="https://github.com/{{ member.github }}"
                    target="_blank"
                    class="member-name"
                    >{{ member.name }}</a
                  >
                  <div class="member-github">@{{ member.github }}</div>
                </div>
              </div>
            </td>
            <td>
              <span class="tier tier-{{ member.tier|lower }}"
                >{{ member.tier }}</span
              >
            </td>
            <td class="score">{{ member.score }}</td>
            <td class="metric">{{ member.contributions }}</td>
            <td>
              <div class="badges">
                {% for badge in member.badges %}
                <span class="badge">{{ badge }}</span>
                {% empty %}
                <span class="no-badge">—</span>
                {% endfor %}
              </div>
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
